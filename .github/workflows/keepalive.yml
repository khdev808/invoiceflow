# Ping Render free-tier services before the 15-minute idle spin-down.
# Official fix: upgrade to Render Starter ($7/mo per service).
name: Keep Render services awake

on:
  schedule:
    # Every 10 minutes (GitHub Actions cron uses UTC)
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: curl -fsS --max-time 60 https://invoiceflow-api-v1td.onrender.com/health

      - name: Ping admin
        run: curl -fsS --max-time 60 https://invoiceflow-admin.onrender.com/
