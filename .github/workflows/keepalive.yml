# Ping Render free-tier services before the 15-minute idle spin-down.
# Official fix: upgrade to Render Starter ($7/mo per service).
name: Keep Render services awake

on:
  schedule:
    # Every 10 minutes (GitHub Actions cron uses UTC)
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Ping API health
        shell: bash
        run: |
          set -euo pipefail
          url="https://invoiceflow-api-v1td.onrender.com/health"
          for attempt in 1 2 3 4 5 6; do
            echo "API attempt ${attempt}/6"
            if curl -fsS --connect-timeout 20 --max-time 120 "$url"; then
              echo "API ok"
              exit 0
            fi
            echo "API not ready yet, waiting 20s..."
            sleep 20
          done
          echo "API ping failed after retries"
          exit 1

      - name: Ping admin
        shell: bash
        run: |
          set -euo pipefail
          url="https://invoiceflow-admin.onrender.com/"
          for attempt in 1 2 3 4 5 6; do
            echo "Admin attempt ${attempt}/6"
            code="$(curl -sS --connect-timeout 20 --max-time 120 -o /dev/null -w "%{http_code}" "$url" || true)"
            if [ "$code" = "200" ]; then
              echo "Admin ok (HTTP ${code})"
              exit 0
            fi
            echo "Admin returned HTTP ${code:-000}, waiting 20s..."
            sleep 20
          done
          echo "Admin ping failed after retries"
          exit 1
