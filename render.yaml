# InvoiceFlow — Render Blueprint (API + Admin + Postgres)
# Phase 0 production foundation: Starter web services + paid Postgres (~$20/mo).
# Apply: Render Dashboard → New → Blueprint → connect github.com/khdev808/invoiceflow

databases:
  - name: invoiceflow-db
    plan: starter
    region: ohio
    databaseName: invoiceflow
    user: invoiceflow

services:
  - type: web
    name: invoiceflow-api
    runtime: node
    plan: starter
    region: ohio
    branch: main
    repo: https://github.com/khdev808/invoiceflow
    buildCommand: npm run render:build:api
    startCommand: npm run render:start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: invoiceflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_APP_URL
        fromService:
          type: web
          name: invoiceflow-admin
          envVarKey: RENDER_EXTERNAL_URL
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@invoiceflow.app
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN
        value: "false"
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: web
    name: invoiceflow-admin
    runtime: node
    plan: starter
    region: ohio
    branch: main
    repo: https://github.com/khdev808/invoiceflow
    buildCommand: npm run render:build:admin
    startCommand: npm run render:start:admin
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: invoiceflow-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_TURNSTILE_SITE_KEY
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: NEXT_PUBLIC_POSTHOG_KEY
        sync: false
      - key: NEXT_PUBLIC_POSTHOG_HOST
        value: https://us.i.posthog.com
