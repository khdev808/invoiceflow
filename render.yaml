# InvoiceFlow — Render Blueprint (API + Admin)
# Postgres already provisioned as `invoiceflow-db` — link it to invoiceflow-api in the dashboard.
# Apply: Render Dashboard → New → Blueprint → connect github.com/khdev808/invoiceflow
# Or run: bash scripts/render-provision.sh (after GitHub is connected)

services:
  - type: web
    name: invoiceflow-api
    runtime: node
    plan: free
    region: ohio
    branch: main
    repo: https://github.com/khdev808/invoiceflow
    buildCommand: npm run render:build:api
    startCommand: npm run render:start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_APP_URL
        fromService:
          type: web
          name: invoiceflow-admin
          envVarKey: RENDER_EXTERNAL_URL
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@invoiceflow.app
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN
        value: "false"

  - type: web
    name: invoiceflow-admin
    runtime: node
    plan: free
    region: ohio
    branch: main
    repo: https://github.com/khdev808/invoiceflow
    buildCommand: npm run render:build:admin
    startCommand: npm run render:start:admin
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: invoiceflow-api
          envVarKey: RENDER_EXTERNAL_URL
